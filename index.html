<style id="protocord-enhancement-layer">
  :root {
    --pc-accent: #2563eb;
    --pc-accent-2: #38bdf8;
    --pc-cyan: #22d3ee;
    --pc-violet: #8b5cf6;
    --pc-success: #10b981;
    --pc-warn: #f59e0b;
    --pc-danger: #ef4444;

    --pc-radius-lg: 18px;
    --pc-radius-xl: 24px;
    --pc-radius-2xl: 28px;

    --pc-shadow-soft: 0 10px 30px rgba(0, 0, 0, .12);
    --pc-shadow-md: 0 18px 40px rgba(0, 0, 0, .18);
    --pc-shadow-glow: 0 0 0 1px rgba(56, 189, 248, .10), 0 18px 40px rgba(37, 99, 235, .18);
    --pc-transition: 220ms cubic-bezier(.2,.8,.2,1);
  }

  html,
  body {
    scroll-behavior: smooth;
  }

  body {
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body,
  #main-content,
  #desktop-header,
  #sidebar,
  #mobile-sidebar,
  .kpi-panel,
  .reports-card,
  .assistant-card,
  .assistant-sidecard,
  .ia-card,
  .sidebar-item,
  .toggle-theme-btn,
  .reports-btn,
  .ia-btn-primary,
  .ia-btn-secondary,
  .ia-icon-btn,
  .mobile-theme-chip {
    transition:
      background-color var(--pc-transition),
      border-color var(--pc-transition),
      color var(--pc-transition),
      box-shadow var(--pc-transition),
      transform var(--pc-transition),
      opacity var(--pc-transition);
  }

  body[data-theme="dark"],
  html[data-theme="dark"] body {
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.10), transparent 22%),
      radial-gradient(circle at top right, rgba(34,211,238,.08), transparent 18%),
      #0b1220;
  }

  body[data-theme="light"],
  html[data-theme="light"] body {
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.05), transparent 22%),
      radial-gradient(circle at top right, rgba(34,211,238,.04), transparent 18%),
      #eef4fb;
  }

  #desktop-header {
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(148, 163, 184, .08);
  }

  html[data-theme="dark"] #desktop-header {
    background: rgba(11, 18, 32, .72);
    box-shadow: 0 8px 30px rgba(2, 6, 23, .28);
  }

  html[data-theme="light"] #desktop-header {
    background: rgba(255, 255, 255, .75);
    box-shadow: 0 8px 30px rgba(148, 163, 184, .12);
  }

  #sidebar,
  #mobile-sidebar {
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  html[data-theme="dark"] #sidebar,
  html[data-theme="dark"] #mobile-sidebar {
    background:
      linear-gradient(180deg, rgba(15, 23, 42, .96), rgba(7, 12, 24, .98));
    box-shadow: inset -1px 0 0 rgba(255,255,255,.03);
  }

  html[data-theme="light"] #sidebar,
  html[data-theme="light"] #mobile-sidebar {
    background:
      linear-gradient(180deg, rgba(248, 251, 255, .96), rgba(240, 246, 252, .98));
    box-shadow: inset -1px 0 0 rgba(148,163,184,.10);
  }

  .sidebar-item {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
  }

  .sidebar-item::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity var(--pc-transition);
    pointer-events: none;
  }

  html[data-theme="dark"] .sidebar-item::before {
    background: linear-gradient(90deg, rgba(37,99,235,.14), rgba(34,211,238,.06));
  }

  html[data-theme="light"] .sidebar-item::before {
    background: linear-gradient(90deg, rgba(37,99,235,.10), rgba(34,211,238,.05));
  }

  .sidebar-item:hover::before,
  .sidebar-item.active::before {
    opacity: 1;
  }

  .sidebar-item:hover {
    transform: translateX(2px);
  }

  .toggle-theme-btn,
  .mobile-theme-chip,
  .reports-btn,
  .ia-btn-primary,
  .ia-btn-secondary,
  .ia-icon-btn,
  #btn-auth-submit {
    will-change: transform, box-shadow;
  }

  .toggle-theme-btn:hover,
  .mobile-theme-chip:hover,
  .reports-btn:hover,
  .ia-btn-primary:hover,
  .ia-btn-secondary:hover,
  .ia-icon-btn:hover,
  #btn-auth-submit:hover {
    transform: translateY(-1px);
  }

  .toggle-theme-btn.active {
    box-shadow: var(--pc-shadow-glow);
  }

  html[data-theme="dark"] .kpi-panel,
  html[data-theme="dark"] .reports-card,
  html[data-theme="dark"] .assistant-card,
  html[data-theme="dark"] .assistant-sidecard,
  html[data-theme="dark"] .ia-card,
  html[data-theme="dark"] #auth-container .bg-gray-900 {
    background:
      linear-gradient(180deg, rgba(15,23,42,.84), rgba(10,15,28,.92));
    border-color: rgba(59, 130, 246, .10) !important;
    box-shadow: var(--pc-shadow-md);
  }

  html[data-theme="light"] .kpi-panel,
  html[data-theme="light"] .reports-card,
  html[data-theme="light"] .assistant-card,
  html[data-theme="light"] .assistant-sidecard,
  html[data-theme="light"] .ia-card,
  html[data-theme="light"] #auth-container .bg-gray-900 {
    background:
      linear-gradient(180deg, rgba(255,255,255,.96), rgba(247,250,253,.96));
    border-color: rgba(148, 163, 184, .16) !important;
    box-shadow: 0 12px 32px rgba(148, 163, 184, .14);
  }

  .kpi-panel:hover,
  .reports-card:hover,
  .assistant-card:hover,
  .assistant-sidecard:hover,
  .ia-card:hover {
    box-shadow: var(--pc-shadow-glow);
  }

  .kpi-title,
  .reports-title,
  .assistant-title,
  .ia-main-title {
    letter-spacing: -.03em;
  }

  .kpi-badge,
  .reports-sync-badge,
  .sidebar-pill,
  .ia-pill {
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    backdrop-filter: blur(10px);
  }

  .kpi-stat-card,
  .reports-kpi-card,
  .ia-metric-card {
    position: relative;
    overflow: hidden;
  }

  .kpi-stat-card::after,
  .reports-kpi-card::after,
  .ia-metric-card::after {
    content: "";
    position: absolute;
    inset: -40% auto auto -30%;
    width: 120px;
    height: 120px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(56,189,248,.12), transparent 70%);
    pointer-events: none;
  }

  html[data-theme="light"] .kpi-stat-card::after,
  html[data-theme="light"] .reports-kpi-card::after,
  html[data-theme="light"] .ia-metric-card::after {
    background: radial-gradient(circle, rgba(37,99,235,.08), transparent 70%);
  }

  .ia-ticket-list,
  .assistant-messages,
  .sidebar-nav,
  .kpi-table-wrap,
  .reports-table-wrap {
    scrollbar-width: thin;
    scrollbar-color: rgba(100,116,139,.45) transparent;
  }

  .ia-ticket-list::-webkit-scrollbar,
  .assistant-messages::-webkit-scrollbar,
  .sidebar-nav::-webkit-scrollbar,
  .kpi-table-wrap::-webkit-scrollbar,
  .reports-table-wrap::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  .ia-ticket-list::-webkit-scrollbar-thumb,
  .assistant-messages::-webkit-scrollbar-thumb,
  .sidebar-nav::-webkit-scrollbar-thumb,
  .kpi-table-wrap::-webkit-scrollbar-thumb,
  .reports-table-wrap::-webkit-scrollbar-thumb {
    background: rgba(100,116,139,.38);
    border-radius: 999px;
  }

  .ia-card {
    position: relative;
    overflow: hidden;
  }

  .ia-card::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at top right, rgba(34,211,238,.08), transparent 26%);
    opacity: .9;
  }

  .ia-section-header,
  .ia-main-header,
  .reports-card-header,
  .kpi-panel-header {
    position: relative;
    z-index: 1;
  }

  /* Player refinado sem trocar sua lógica */
  #ia-audio-card {
    position: relative;
  }

  #ia-audio-card .ia-audio-shell {
    position: relative;
    padding: 14px;
    border-radius: 20px;
    overflow: hidden;
  }

  html[data-theme="dark"] #ia-audio-card .ia-audio-shell {
    background:
      linear-gradient(180deg, rgba(15,23,42,.80), rgba(8,14,28,.92));
    border: 1px solid rgba(56,189,248,.14);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.03),
      0 14px 34px rgba(2,6,23,.28);
  }

  html[data-theme="light"] #ia-audio-card .ia-audio-shell {
    background:
      linear-gradient(180deg, rgba(255,255,255,.96), rgba(246,249,253,.96));
    border: 1px solid rgba(56,189,248,.12);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.75),
      0 14px 34px rgba(148,163,184,.16);
  }

  #ia-audio-card .ia-audio-shell::before {
    content: "";
    position: absolute;
    top: -42px;
    right: -42px;
    width: 140px;
    height: 140px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(34,211,238,.16), transparent 70%);
    pointer-events: none;
  }

  #ia-audio-card .ia-audio-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  #ia-audio-card .ia-audio-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .01em;
  }

  html[data-theme="dark"] #ia-audio-card .ia-audio-badge {
    background: rgba(34,211,238,.10);
    color: #9be8f5;
    border: 1px solid rgba(34,211,238,.16);
  }

  html[data-theme="light"] #ia-audio-card .ia-audio-badge {
    background: rgba(37,99,235,.08);
    color: #1e40af;
    border: 1px solid rgba(37,99,235,.10);
  }

  #ia-audio-card .ia-audio-wave {
    display: flex;
    align-items: end;
    gap: 4px;
    height: 22px;
  }

  #ia-audio-card .ia-audio-wave span {
    width: 4px;
    border-radius: 999px;
    background: linear-gradient(180deg, #67e8f9, #2563eb);
    animation: pcWave 1.2s ease-in-out infinite;
    transform-origin: bottom center;
    opacity: .9;
  }

  #ia-audio-card .ia-audio-wave span:nth-child(1) { height: 8px; animation-delay: .00s; }
  #ia-audio-card .ia-audio-wave span:nth-child(2) { height: 16px; animation-delay: .10s; }
  #ia-audio-card .ia-audio-wave span:nth-child(3) { height: 12px; animation-delay: .20s; }
  #ia-audio-card .ia-audio-wave span:nth-child(4) { height: 20px; animation-delay: .30s; }
  #ia-audio-card .ia-audio-wave span:nth-child(5) { height: 10px; animation-delay: .40s; }

  @keyframes pcWave {
    0%, 100% { transform: scaleY(.6); opacity: .55; }
    50% { transform: scaleY(1.15); opacity: 1; }
  }

  #ia-audio-player {
    width: 100%;
    min-height: 52px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  #ia-audio-player::-webkit-media-controls-panel {
    background: transparent;
  }

  .pc-reveal {
    opacity: 0;
    transform: translateY(10px);
  }

  .pc-ready {
    opacity: 1;
    transform: none;
  }

  .pc-glow-hover:hover {
    box-shadow: var(--pc-shadow-glow);
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation: none !important;
      transition-duration: .01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>

<script type="module" id="protocord-enhancement-script">
  const motionModule = await import('https://cdn.jsdelivr.net/npm/motion@11.11.13/+esm').catch(() => null);
  const animate = motionModule?.animate || null;
  const stagger = motionModule?.stagger || null;
  const inView = motionModule?.inView || null;

  const $ = (sel, ctx = document) => ctx.querySelector(sel);
  const $$ = (sel, ctx = document) => Array.from(ctx.querySelectorAll(sel));

  const raf = (fn) => requestAnimationFrame(() => requestAnimationFrame(fn));

  function wrapAudioPlayer() {
    const card = $('#ia-audio-card');
    const player = $('#ia-audio-player');
    if (!card || !player) return;
    if (card.querySelector('.ia-audio-shell')) return;

    const sectionHeader = card.querySelector('.ia-section-header');
    const shell = document.createElement('div');
    shell.className = 'ia-audio-shell pc-reveal';

    const meta = document.createElement('div');
    meta.className = 'ia-audio-meta';
    meta.innerHTML = `
      <div class="ia-audio-badge">
        <i data-lucide="radio" class="w-4 h-4"></i>
        Reprodução local
      </div>
      <div class="ia-audio-wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    `;

    const oldParent = player.parentElement;
    oldParent.insertBefore(shell, player);
    shell.appendChild(meta);
    shell.appendChild(player);

    if (sectionHeader) {
      sectionHeader.classList.add('pc-glow-hover');
    }

    if (window.lucide?.createIcons) window.lucide.createIcons();
  }

  function markRevealTargets() {
    [
      '.kpi-panel',
      '.reports-card',
      '.assistant-card',
      '.assistant-sidecard',
      '.ia-card',
      '.kpi-stat-card',
      '.reports-kpi-card',
      '.ia-metric-card',
      '.sidebar-item',
      '.theme-toggles-container .toggle-theme-btn'
    ].forEach((selector) => {
      $$(selector).forEach((el) => el.classList.add('pc-reveal'));
    });
  }

  function runRevealAnimations() {
    if (!animate || !inView) {
      $$('.pc-reveal').forEach((el) => el.classList.add('pc-ready'));
      return;
    }

    inView('.pc-reveal', (element) => {
      animate(
        element,
        {
          opacity: [0, 1],
          y: [12, 0],
          filter: ['blur(8px)', 'blur(0px)']
        },
        {
          duration: 0.42,
          easing: [0.22, 1, 0.36, 1]
        }
      );
      element.classList.add('pc-ready');
    });
  }

  function animateActivePage() {
    if (!animate) return;
    const visiblePage = $$('[id^="pagina-"]:not(.hidden)').filter((el) => getComputedStyle(el).display !== 'none')[0];
    if (!visiblePage) return;

    const hero = visiblePage.querySelector('.kpi-hero, .reports-hero, .assistant-hero, .ia-main-header');
    const cards = $$(
      '.kpi-panel, .reports-card, .assistant-card, .assistant-sidecard, .ia-card, .kpi-stat-card, .reports-kpi-card',
      visiblePage
    ).slice(0, 12);

    if (hero) {
      animate(hero, { opacity: [0,1], y: [8,0] }, { duration: .32, easing: 'ease-out' });
    }

    if (cards.length) {
      animate(
        cards,
        { opacity: [0,1], y: [14,0], scale: [0.985,1] },
        { duration: .36, delay: stagger ? stagger(0.035) : 0, easing: 'ease-out' }
      );
    }
  }

  function enhanceButtons() {
    const selectors = [
      '.reports-btn',
      '.ia-btn-primary',
      '.ia-btn-secondary',
      '.ia-icon-btn',
      '.toggle-theme-btn',
      '.mobile-theme-chip',
      '#btn-auth-submit',
      '.sidebar-item'
    ];

    selectors.forEach((selector) => {
      $$(selector).forEach((el) => {
        if (el.dataset.pcEnhanced === '1') return;
        el.dataset.pcEnhanced = '1';

        el.addEventListener('pointerenter', () => {
          if (!animate) return;
          animate(el, { scale: 1.01, y: -1 }, { duration: .16, easing: 'ease-out' });
        });

        el.addEventListener('pointerleave', () => {
          if (!animate) return;
          animate(el, { scale: 1, y: 0 }, { duration: .16, easing: 'ease-out' });
        });

        el.addEventListener('pointerdown', () => {
          if (!animate) return;
          animate(el, { scale: .985 }, { duration: .08, easing: 'ease-out' });
        });

        el.addEventListener('pointerup', () => {
          if (!animate) return;
          animate(el, { scale: 1 }, { duration: .14, easing: 'ease-out' });
        });
      });
    });
  }

  function optimizeIconsRefresh() {
    let queued = false;
    const run = () => {
      queued = false;
      if (window.lucide?.createIcons) window.lucide.createIcons();
    };

    const schedule = () => {
      if (queued) return;
      queued = true;
      requestAnimationFrame(run);
    };

    const observer = new MutationObserver(schedule);
    observer.observe(document.body, { childList: true, subtree: true });
  }

  function patchNavigationAnimation() {
    if (typeof window.mostrarPagina !== 'function') return;
    if (window.__pcMostrarPaginaPatched) return;

    const original = window.mostrarPagina;
    window.mostrarPagina = function (...args) {
      const result = original.apply(this, args);
      raf(() => {
        wrapAudioPlayer();
        markRevealTargets();
        runRevealAnimations();
        enhanceButtons();
        animateActivePage();
      });
      return result;
    };
    window.__pcMostrarPaginaPatched = true;
  }

  function patchThemeAnimation() {
    if (typeof window.alternarTema !== 'function') return;
    if (window.__pcAlternarTemaPatched) return;

    const original = window.alternarTema;
    window.alternarTema = function (...args) {
      const result = original.apply(this, args);
      raf(() => {
        wrapAudioPlayer();
        enhanceButtons();
        animateActivePage();
      });
      return result;
    };
    window.__pcAlternarTemaPatched = true;
  }

  function patchAudioBehavior() {
    const player = $('#ia-audio-player');
    const card = $('#ia-audio-card');
    if (!player || !card) return;
    if (player.dataset.pcAudioBound === '1') return;
    player.dataset.pcAudioBound = '1';

    const playAnim = () => {
      if (!animate) return;
      animate(card, { boxShadow: ['0 0 0 rgba(0,0,0,0)', '0 0 0 1px rgba(56,189,248,.10), 0 20px 44px rgba(37,99,235,.18)'] }, { duration: .35 });
    };

    const stopAnim = () => {
      if (!animate) return;
      animate(card, { boxShadow: ['0 0 0 1px rgba(56,189,248,.10), 0 20px 44px rgba(37,99,235,.18)', '0 12px 32px rgba(0,0,0,.12)'] }, { duration: .3 });
    };

    player.addEventListener('play', playAnim);
    player.addEventListener('pause', stopAnim);
    player.addEventListener('ended', stopAnim);
  }

  function softOptimizeInputs() {
    $$('input, textarea, select').forEach((el) => {
      if (el.dataset.pcInputBound === '1') return;
      el.dataset.pcInputBound = '1';

      el.addEventListener('focus', () => {
        if (!animate) return;
        animate(el, { scale: [1, 1.005, 1] }, { duration: .18, easing: 'ease-out' });
      });
    });
  }

  function duplicateIdWarning() {
    const ids = {};
    $$('[id]').forEach((el) => {
      ids[el.id] = (ids[el.id] || 0) + 1;
    });
    const duplicates = Object.entries(ids).filter(([, count]) => count > 1).map(([id]) => id);
    if (duplicates.length) {
      console.warn('ProtoCord enhancement: IDs duplicados encontrados:', duplicates);
    }
  }

  function initEnhancements() {
    wrapAudioPlayer();
    markRevealTargets();
    runRevealAnimations();
    enhanceButtons();
    optimizeIconsRefresh();
    patchNavigationAnimation();
    patchThemeAnimation();
    patchAudioBehavior();
    softOptimizeInputs();
    animateActivePage();
    duplicateIdWarning();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => raf(initEnhancements));
  } else {
    raf(initEnhancements);
  }
</script>
