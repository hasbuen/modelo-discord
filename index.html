<style id="pc-non-destructive-polish">
  :root {
    --pc-accent: #3b82f6;
    --pc-accent-soft: rgba(59, 130, 246, .14);
    --pc-cyan-soft: rgba(34, 211, 238, .12);
    --pc-glow-dark: 0 0 0 1px rgba(59,130,246,.14), 0 14px 34px rgba(37,99,235,.18);
    --pc-glow-light: 0 0 0 1px rgba(59,130,246,.10), 0 12px 28px rgba(59,130,246,.10);
    --pc-shadow-dark: 0 14px 30px rgba(2,6,23,.22);
    --pc-shadow-light: 0 10px 24px rgba(148,163,184,.16);
    --pc-transition: 220ms cubic-bezier(.2,.8,.2,1);
  }

  html, body {
    scroll-behavior: smooth;
  }

  body {
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body,
  #desktop-header,
  #sidebar,
  #mobile-sidebar,
  .sidebar-item,
  .toggle-theme-btn,
  .mobile-theme-chip,
  .kpi-panel,
  .kpi-stat-card,
  .reports-card,
  .reports-kpi-card,
  .assistant-card,
  .assistant-sidecard,
  .ia-card,
  .ia-btn-primary,
  .ia-btn-secondary,
  .ia-icon-btn,
  .reports-btn,
  #btn-auth-submit,
  input,
  textarea,
  select,
  audio {
    transition:
      background-color var(--pc-transition),
      border-color var(--pc-transition),
      color var(--pc-transition),
      box-shadow var(--pc-transition),
      transform var(--pc-transition),
      opacity var(--pc-transition),
      filter var(--pc-transition);
  }

  html[data-theme="dark"] body {
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.10), transparent 24%),
      radial-gradient(circle at top right, rgba(34,211,238,.08), transparent 18%),
      #0b1220;
  }

  html[data-theme="light"] body {
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.05), transparent 24%),
      radial-gradient(circle at top right, rgba(34,211,238,.05), transparent 18%),
      #eef4fb;
  }

  #desktop-header {
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  html[data-theme="dark"] #desktop-header {
    background: rgba(11,18,32,.70);
    border-bottom: 1px solid rgba(148,163,184,.08);
    box-shadow: 0 8px 30px rgba(2,6,23,.22);
  }

  html[data-theme="light"] #desktop-header {
    background: rgba(255,255,255,.74);
    border-bottom: 1px solid rgba(148,163,184,.14);
    box-shadow: 0 8px 24px rgba(148,163,184,.12);
  }

  #sidebar,
  #mobile-sidebar {
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  html[data-theme="dark"] #sidebar,
  html[data-theme="dark"] #mobile-sidebar {
    background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(7,12,24,.98));
  }

  html[data-theme="light"] #sidebar,
  html[data-theme="light"] #mobile-sidebar {
    background: linear-gradient(180deg, rgba(248,251,255,.96), rgba(240,246,252,.98));
  }

  .sidebar-item {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
  }

  .sidebar-item::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--pc-transition);
  }

  html[data-theme="dark"] .sidebar-item::before {
    background: linear-gradient(90deg, rgba(59,130,246,.14), rgba(34,211,238,.06));
  }

  html[data-theme="light"] .sidebar-item::before {
    background: linear-gradient(90deg, rgba(59,130,246,.10), rgba(34,211,238,.05));
  }

  .sidebar-item:hover::before,
  .sidebar-item.active::before {
    opacity: 1;
  }

  html[data-theme="dark"] .kpi-panel,
  html[data-theme="dark"] .kpi-stat-card,
  html[data-theme="dark"] .reports-card,
  html[data-theme="dark"] .reports-kpi-card,
  html[data-theme="dark"] .assistant-card,
  html[data-theme="dark"] .assistant-sidecard,
  html[data-theme="dark"] .ia-card,
  html[data-theme="dark"] #auth-container .bg-gray-900 {
    box-shadow: var(--pc-shadow-dark);
  }

  html[data-theme="light"] .kpi-panel,
  html[data-theme="light"] .kpi-stat-card,
  html[data-theme="light"] .reports-card,
  html[data-theme="light"] .reports-kpi-card,
  html[data-theme="light"] .assistant-card,
  html[data-theme="light"] .assistant-sidecard,
  html[data-theme="light"] .ia-card,
  html[data-theme="light"] #auth-container .bg-gray-900 {
    box-shadow: var(--pc-shadow-light);
  }

  .kpi-panel:hover,
  .kpi-stat-card:hover,
  .reports-card:hover,
  .reports-kpi-card:hover,
  .assistant-card:hover,
  .assistant-sidecard:hover,
  .ia-card:hover {
    transform: translateY(-1px);
  }

  html[data-theme="dark"] .kpi-panel:hover,
  html[data-theme="dark"] .kpi-stat-card:hover,
  html[data-theme="dark"] .reports-card:hover,
  html[data-theme="dark"] .reports-kpi-card:hover,
  html[data-theme="dark"] .assistant-card:hover,
  html[data-theme="dark"] .assistant-sidecard:hover,
  html[data-theme="dark"] .ia-card:hover {
    box-shadow: var(--pc-glow-dark);
  }

  html[data-theme="light"] .kpi-panel:hover,
  html[data-theme="light"] .kpi-stat-card:hover,
  html[data-theme="light"] .reports-card:hover,
  html[data-theme="light"] .reports-kpi-card:hover,
  html[data-theme="light"] .assistant-card:hover,
  html[data-theme="light"] .assistant-sidecard:hover,
  html[data-theme="light"] .ia-card:hover {
    box-shadow: var(--pc-glow-light);
  }

  .kpi-title,
  .reports-title,
  .assistant-title,
  .ia-main-title {
    letter-spacing: -.03em;
  }

  .kpi-badge,
  .sidebar-pill,
  .ia-pill,
  .reports-sync-badge {
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .toggle-theme-btn:hover,
  .mobile-theme-chip:hover,
  .reports-btn:hover,
  .ia-btn-primary:hover,
  .ia-btn-secondary:hover,
  .ia-icon-btn:hover,
  #btn-auth-submit:hover {
    transform: translateY(-1px);
  }

  html[data-theme="dark"] .toggle-theme-btn.active {
    box-shadow: var(--pc-glow-dark);
  }

  html[data-theme="light"] .toggle-theme-btn.active {
    box-shadow: var(--pc-glow-light);
  }

  html[data-theme="dark"] input:focus,
  html[data-theme="dark"] textarea:focus,
  html[data-theme="dark"] select:focus {
    box-shadow: 0 0 0 4px rgba(59,130,246,.14);
  }

  html[data-theme="light"] input:focus,
  html[data-theme="light"] textarea:focus,
  html[data-theme="light"] select:focus {
    box-shadow: 0 0 0 4px rgba(59,130,246,.10);
  }

  .pc-motion-target {
    will-change: transform, opacity, filter;
  }

  /* Player: só visual, sem mudar estrutura */
  #ia-audio-card {
    position: relative;
    overflow: hidden;
  }

  #ia-audio-card::before {
    content: "";
    position: absolute;
    top: -48px;
    right: -48px;
    width: 140px;
    height: 140px;
    border-radius: 999px;
    pointer-events: none;
    background: radial-gradient(circle, rgba(34,211,238,.14), transparent 70%);
  }

  #ia-audio-card::after {
    content: "";
    position: absolute;
    inset: auto auto 12px 16px;
    width: 42px;
    height: 42px;
    border-radius: 999px;
    opacity: .95;
    pointer-events: none;
    background:
      radial-gradient(circle at center, rgba(34,211,238,.26), rgba(34,211,238,.08) 55%, transparent 70%);
    box-shadow: 0 0 24px rgba(34,211,238,.12);
  }

  html[data-theme="dark"] #ia-audio-player {
    background: rgba(255,255,255,.02);
    border-radius: 16px;
    box-shadow: inset 0 0 0 1px rgba(148,163,184,.08);
  }

  html[data-theme="light"] #ia-audio-player {
    background: rgba(255,255,255,.72);
    border-radius: 16px;
    box-shadow: inset 0 0 0 1px rgba(148,163,184,.14);
  }

  #ia-audio-player::-webkit-media-controls-panel {
    background: transparent;
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation: none !important;
      transition-duration: .01ms !important;
    }
  }
</style>

<script type="module">
  const motion = await import('https://cdn.jsdelivr.net/npm/motion@11.11.13/+esm').catch(() => null);
  const animate = motion?.animate;
  const stagger = motion?.stagger;

  const getAll = (selector, context = document) => Array.from(context.querySelectorAll(selector));

  const motionSelectors = [
    '.kpi-panel',
    '.kpi-stat-card',
    '.reports-card',
    '.reports-kpi-card',
    '.assistant-card',
    '.assistant-sidecard',
    '.ia-card',
    '.sidebar-item',
    '.toggle-theme-btn',
    '.reports-btn',
    '.ia-btn-primary',
    '.ia-btn-secondary',
    '.ia-icon-btn',
    '.mobile-theme-chip',
    '#btn-auth-submit'
  ];

  function marcarElementos() {
    motionSelectors.forEach((selector) => {
      getAll(selector).forEach((element) => {
        element.classList.add('pc-motion-target');
      });
    });
  }

  function animarHover(element) {
    if (!animate || !element || element.dataset.pcHoverBound === '1') return;
    element.dataset.pcHoverBound = '1';

    element.addEventListener('pointerenter', () => {
      animate(element, { y: -1, scale: 1.01 }, { duration: .16, easing: 'ease-out' });
    });

    element.addEventListener('pointerleave', () => {
      animate(element, { y: 0, scale: 1 }, { duration: .16, easing: 'ease-out' });
    });

    element.addEventListener('pointerdown', () => {
      animate(element, { scale: .985 }, { duration: .08, easing: 'ease-out' });
    });

    element.addEventListener('pointerup', () => {
      animate(element, { scale: 1 }, { duration: .14, easing: 'ease-out' });
    });
  }

  function ligarHovers() {
    [
      '.sidebar-item',
      '.toggle-theme-btn',
      '.reports-btn',
      '.ia-btn-primary',
      '.ia-btn-secondary',
      '.ia-icon-btn',
      '.mobile-theme-chip',
      '#btn-auth-submit'
    ].forEach((selector) => {
      getAll(selector).forEach(animarHover);
    });
  }

  function ligarFocoInputs() {
    getAll('input, textarea, select').forEach((element) => {
      if (element.dataset.pcFocusBound === '1') return;
      element.dataset.pcFocusBound = '1';

      element.addEventListener('focus', () => {
        if (!animate) return;
        animate(element, { scale: [1, 1.005, 1] }, { duration: .18, easing: 'ease-out' });
      });
    });
  }

  function obterPaginaVisivel() {
    return getAll('[id^="pagina-"]').find((element) => !element.classList.contains('hidden'));
  }

  function animarPaginaVisivel() {
    if (!animate) return;

    const paginaVisivel = obterPaginaVisivel();
    if (!paginaVisivel) return;

    const blocos = [
      ...getAll('.kpi-hero, .reports-hero, .assistant-hero, .ia-main-header', paginaVisivel),
      ...getAll('.kpi-panel, .kpi-stat-card, .reports-card, .reports-kpi-card, .assistant-card, .assistant-sidecard, .ia-card', paginaVisivel).slice(0, 16)
    ];

    if (!blocos.length) return;

    animate(
      blocos,
      { opacity: [0, 1], y: [12, 0], scale: [0.992, 1] },
      { duration: .34, delay: stagger ? stagger(0.03) : 0, easing: 'ease-out' }
    );
  }

  function animarTrocaDeTema() {
    if (!animate) return;

    const elementos = getAll('#desktop-header, #sidebar, #mobile-sidebar, .kpi-panel, .reports-card, .assistant-card, .ia-card').slice(0, 18);
    if (!elementos.length) return;

    animate(
      elementos,
      { opacity: [0.94, 1], filter: ['blur(3px)', 'blur(0px)'] },
      { duration: .24, easing: 'ease-out' }
    );
  }

  function animarPlayerAoTocar() {
    const audio = document.getElementById('ia-audio-player');
    const card = document.getElementById('ia-audio-card');
    if (!audio || !card || !animate || audio.dataset.pcAudioBound === '1') return;

    audio.dataset.pcAudioBound = '1';

    const onPlay = () => {
      animate(card, { boxShadow: ['0 0 0 rgba(0,0,0,0)', '0 0 0 1px rgba(34,211,238,.12), 0 16px 36px rgba(34,211,238,.12)'] }, { duration: .28 });
    };

    const onStop = () => {
      animate(card, { boxShadow: ['0 0 0 1px rgba(34,211,238,.12), 0 16px 36px rgba(34,211,238,.12)', '0 10px 24px rgba(0,0,0,.10)'] }, { duration: .28 });
    };

    audio.addEventListener('play', onPlay);
    audio.addEventListener('pause', onStop);
    audio.addEventListener('ended', onStop);
  }

  function aplicarCamadaVisual() {
    marcarElementos();
    ligarHovers();
    ligarFocoInputs();
    animarPlayerAoTocar();
  }

  function observarPaginas() {
    const paginas = getAll('[id^="pagina-"]');
    if (!paginas.length) return;

    const observer = new MutationObserver((mutations) => {
      let deveAnimarPagina = false;

      mutations.forEach((mutation) => {
        if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
          deveAnimarPagina = true;
        }
      });

      if (deveAnimarPagina) {
        aplicarCamadaVisual();
        requestAnimationFrame(() => animarPaginaVisivel());
      }
    });

    paginas.forEach((pagina) => {
      observer.observe(pagina, { attributes: true, attributeFilter: ['class'] });
    });
  }

  function observarTema() {
    const html = document.documentElement;
    if (!html) return;

    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.type === 'attributes' && mutation.attributeName === 'data-theme') {
          aplicarCamadaVisual();
          requestAnimationFrame(() => animarTrocaDeTema());
        }
      });
    });

    observer.observe(html, { attributes: true, attributeFilter: ['data-theme'] });
  }

  function observarDom() {
    const observer = new MutationObserver(() => {
      aplicarCamadaVisual();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  function iniciarCamada() {
    aplicarCamadaVisual();
    animarPaginaVisivel();
    observarPaginas();
    observarTema();
    observarDom();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', iniciarCamada);
  } else {
    iniciarCamada();
  }
</script>
