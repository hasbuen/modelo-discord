<style id="pc-ui-polish">
  :root {
    --pc-accent: #3b82f6;
    --pc-accent-2: #22d3ee;
    --pc-glow-dark: 0 0 0 1px rgba(59,130,246,.14), 0 14px 34px rgba(37,99,235,.18);
    --pc-glow-light: 0 0 0 1px rgba(59,130,246,.10), 0 12px 28px rgba(59,130,246,.10);
    --pc-shadow-dark: 0 14px 30px rgba(2,6,23,.22);
    --pc-shadow-light: 0 10px 24px rgba(148,163,184,.16);
    --pc-transition: 220ms cubic-bezier(.2,.8,.2,1);
  }

  html,
  body {
    scroll-behavior: smooth;
  }

  body {
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body,
  #desktop-header,
  #sidebar,
  #mobile-sidebar,
  .sidebar-item,
  .toggle-theme-btn,
  .mobile-theme-chip,
  .kpi-panel,
  .kpi-stat-card,
  .reports-card,
  .reports-kpi-card,
  .assistant-card,
  .assistant-sidecard,
  .ia-card,
  .ia-btn-primary,
  .ia-btn-secondary,
  .ia-icon-btn,
  .reports-btn,
  #btn-auth-submit,
  input,
  textarea,
  select {
    transition:
      background-color var(--pc-transition),
      border-color var(--pc-transition),
      color var(--pc-transition),
      box-shadow var(--pc-transition),
      transform var(--pc-transition),
      opacity var(--pc-transition);
  }

  html[data-theme="dark"] body {
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.10), transparent 24%),
      radial-gradient(circle at top right, rgba(34,211,238,.08), transparent 18%),
      #0b1220;
  }

  html[data-theme="light"] body {
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.05), transparent 24%),
      radial-gradient(circle at top right, rgba(34,211,238,.05), transparent 18%),
      #eef4fb;
  }

  #desktop-header {
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  html[data-theme="dark"] #desktop-header {
    background: rgba(11,18,32,.70);
    border-bottom: 1px solid rgba(148,163,184,.08);
    box-shadow: 0 8px 30px rgba(2,6,23,.22);
  }

  html[data-theme="light"] #desktop-header {
    background: rgba(255,255,255,.74);
    border-bottom: 1px solid rgba(148,163,184,.14);
    box-shadow: 0 8px 24px rgba(148,163,184,.12);
  }

  #sidebar,
  #mobile-sidebar {
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  html[data-theme="dark"] #sidebar,
  html[data-theme="dark"] #mobile-sidebar {
    background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(7,12,24,.98));
  }

  html[data-theme="light"] #sidebar,
  html[data-theme="light"] #mobile-sidebar {
    background: linear-gradient(180deg, rgba(248,251,255,.96), rgba(240,246,252,.98));
  }

  .sidebar-item {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
  }

  .sidebar-item::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--pc-transition);
  }

  html[data-theme="dark"] .sidebar-item::before {
    background: linear-gradient(90deg, rgba(59,130,246,.14), rgba(34,211,238,.06));
  }

  html[data-theme="light"] .sidebar-item::before {
    background: linear-gradient(90deg, rgba(59,130,246,.10), rgba(34,211,238,.05));
  }

  .sidebar-item:hover::before,
  .sidebar-item.active::before {
    opacity: 1;
  }

  html[data-theme="dark"] .kpi-panel,
  html[data-theme="dark"] .kpi-stat-card,
  html[data-theme="dark"] .reports-card,
  html[data-theme="dark"] .reports-kpi-card,
  html[data-theme="dark"] .assistant-card,
  html[data-theme="dark"] .assistant-sidecard,
  html[data-theme="dark"] .ia-card,
  html[data-theme="dark"] #auth-container .bg-gray-900 {
    box-shadow: var(--pc-shadow-dark);
  }

  html[data-theme="light"] .kpi-panel,
  html[data-theme="light"] .kpi-stat-card,
  html[data-theme="light"] .reports-card,
  html[data-theme="light"] .reports-kpi-card,
  html[data-theme="light"] .assistant-card,
  html[data-theme="light"] .assistant-sidecard,
  html[data-theme="light"] .ia-card,
  html[data-theme="light"] #auth-container .bg-gray-900 {
    box-shadow: var(--pc-shadow-light);
  }

  .kpi-panel:hover,
  .kpi-stat-card:hover,
  .reports-card:hover,
  .reports-kpi-card:hover,
  .assistant-card:hover,
  .assistant-sidecard:hover,
  .ia-card:hover {
    transform: translateY(-1px);
  }

  html[data-theme="dark"] .kpi-panel:hover,
  html[data-theme="dark"] .kpi-stat-card:hover,
  html[data-theme="dark"] .reports-card:hover,
  html[data-theme="dark"] .reports-kpi-card:hover,
  html[data-theme="dark"] .assistant-card:hover,
  html[data-theme="dark"] .assistant-sidecard:hover,
  html[data-theme="dark"] .ia-card:hover {
    box-shadow: var(--pc-glow-dark);
  }

  html[data-theme="light"] .kpi-panel:hover,
  html[data-theme="light"] .kpi-stat-card:hover,
  html[data-theme="light"] .reports-card:hover,
  html[data-theme="light"] .reports-kpi-card:hover,
  html[data-theme="light"] .assistant-card:hover,
  html[data-theme="light"] .assistant-sidecard:hover,
  html[data-theme="light"] .ia-card:hover {
    box-shadow: var(--pc-glow-light);
  }

  .kpi-title,
  .reports-title,
  .assistant-title,
  .ia-main-title {
    letter-spacing: -.03em;
  }

  .kpi-badge,
  .sidebar-pill,
  .ia-pill,
  .reports-sync-badge {
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .toggle-theme-btn:hover,
  .mobile-theme-chip:hover,
  .reports-btn:hover,
  .ia-btn-primary:hover,
  .ia-btn-secondary:hover,
  .ia-icon-btn:hover,
  #btn-auth-submit:hover {
    transform: translateY(-1px);
  }

  html[data-theme="dark"] .toggle-theme-btn.active {
    box-shadow: var(--pc-glow-dark);
  }

  html[data-theme="light"] .toggle-theme-btn.active {
    box-shadow: var(--pc-glow-light);
  }

  input:focus,
  textarea:focus,
  select:focus {
    outline: none;
  }

  html[data-theme="dark"] input:focus,
  html[data-theme="dark"] textarea:focus,
  html[data-theme="dark"] select:focus {
    box-shadow: 0 0 0 4px rgba(59,130,246,.14);
  }

  html[data-theme="light"] input:focus,
  html[data-theme="light"] textarea:focus,
  html[data-theme="light"] select:focus {
    box-shadow: 0 0 0 4px rgba(59,130,246,.10);
  }

  .pc-motion-target {
    will-change: transform, opacity, filter;
  }

  /* Refino só visual do player, sem trocar estrutura */
  #ia-audio-card {
    position: relative;
    overflow: hidden;
  }

  #ia-audio-card::before {
    content: "";
    position: absolute;
    top: -48px;
    right: -48px;
    width: 140px;
    height: 140px;
    border-radius: 999px;
    pointer-events: none;
    background: radial-gradient(circle, rgba(34,211,238,.14), transparent 70%);
  }

  html[data-theme="dark"] #ia-audio-player {
    background: rgba(255,255,255,.02);
    border-radius: 16px;
    box-shadow: inset 0 0 0 1px rgba(148,163,184,.08);
  }

  html[data-theme="light"] #ia-audio-player {
    background: rgba(255,255,255,.72);
    border-radius: 16px;
    box-shadow: inset 0 0 0 1px rgba(148,163,184,.14);
  }

  #ia-audio-player::-webkit-media-controls-panel {
    background: transparent;
  }

  .pc-audio-topline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
  }

  .pc-audio-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 12px;
    border-radius: 999px;
  }

  html[data-theme="dark"] .pc-audio-chip {
    background: rgba(34,211,238,.10);
    border: 1px solid rgba(34,211,238,.14);
    color: #9be8f5;
  }

  html[data-theme="light"] .pc-audio-chip {
    background: rgba(59,130,246,.08);
    border: 1px solid rgba(59,130,246,.10);
    color: #1d4ed8;
  }

  .pc-audio-bars {
    display: flex;
    align-items: end;
    gap: 4px;
    height: 22px;
  }

  .pc-audio-bars span {
    width: 4px;
    border-radius: 999px;
    background: linear-gradient(180deg, #67e8f9, #2563eb);
    transform-origin: bottom;
    animation: pc-bars 1.1s ease-in-out infinite;
  }

  .pc-audio-bars span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .pc-audio-bars span:nth-child(2) { height: 16px; animation-delay: .1s; }
  .pc-audio-bars span:nth-child(3) { height: 10px; animation-delay: .2s; }
  .pc-audio-bars span:nth-child(4) { height: 18px; animation-delay: .3s; }
  .pc-audio-bars span:nth-child(5) { height: 12px; animation-delay: .4s; }

  @keyframes pc-bars {
    0%, 100% { transform: scaleY(.6); opacity: .55; }
    50% { transform: scaleY(1.15); opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation: none !important;
      transition-duration: .01ms !important;
    }
  }
</style>

<script type="module">
  const motion = await import('https://cdn.jsdelivr.net/npm/motion@11.11.13/+esm').catch(() => null);
  const animate = motion?.animate;
  const stagger = motion?.stagger;
  const inView = motion?.inView;

  const $ = (s, c = document) => c.querySelector(s);
  const $$ = (s, c = document) => Array.from(c.querySelectorAll(s));

  function markTargets(context = document) {
    const selectors = [
      '.kpi-panel',
      '.kpi-stat-card',
      '.reports-card',
      '.reports-kpi-card',
      '.assistant-card',
      '.assistant-sidecard',
      '.ia-card',
      '.sidebar-item',
      '.toggle-theme-btn',
      '.reports-btn',
      '.ia-btn-primary',
      '.ia-btn-secondary',
      '.ia-icon-btn',
      '.mobile-theme-chip',
      '#btn-auth-submit'
    ];

    selectors.forEach((selector) => {
      $$(selector, context).forEach((el) => el.classList.add('pc-motion-target'));
    });
  }

  function enhanceAudioCard() {
    const card = $('#ia-audio-card');
    const player = $('#ia-audio-player');
    if (!card || !player) return;
    if (card.dataset.pcAudioEnhanced === '1') return;

    const header = card.querySelector('.ia-section-header');
    if (!header) return;

    const top = document.createElement('div');
    top.className = 'pc-audio-topline';
    top.innerHTML = `
      <div class="pc-audio-chip">
        <i data-lucide="radio" class="w-4 h-4"></i>
        Reprodução local
      </div>
      <div class="pc-audio-bars" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    `;

    header.insertAdjacentElement('afterend', top);
    card.dataset.pcAudioEnhanced = '1';

    if (window.lucide?.createIcons) window.lucide.createIcons();
  }

  function animateHover(el) {
    if (!animate || !el) return;
    if (el.dataset.pcHoverBound === '1') return;
    el.dataset.pcHoverBound = '1';

    el.addEventListener('pointerenter', () => {
      animate(el, { y: -1, scale: 1.01 }, { duration: .16, easing: 'ease-out' });
    });

    el.addEventListener('pointerleave', () => {
      animate(el, { y: 0, scale: 1 }, { duration: .16, easing: 'ease-out' });
    });

    el.addEventListener('pointerdown', () => {
      animate(el, { scale: .985 }, { duration: .08, easing: 'ease-out' });
    });

    el.addEventListener('pointerup', () => {
      animate(el, { scale: 1 }, { duration: .14, easing: 'ease-out' });
    });
  }

  function bindInteractiveAnimations(context = document) {
    [
      '.sidebar-item',
      '.toggle-theme-btn',
      '.reports-btn',
      '.ia-btn-primary',
      '.ia-btn-secondary',
      '.ia-icon-btn',
      '.mobile-theme-chip',
      '#btn-auth-submit'
    ].forEach((selector) => {
      $$(selector, context).forEach(animateHover);
    });

    $$('input, textarea, select', context).forEach((el) => {
      if (el.dataset.pcFocusBound === '1') return;
      el.dataset.pcFocusBound = '1';

      el.addEventListener('focus', () => {
        if (!animate) return;
        animate(el, { scale: [1, 1.005, 1] }, { duration: .18, easing: 'ease-out' });
      });
    });
  }

  function revealOnView() {
    if (!animate || !inView) return;

    inView('.pc-motion-target', (element) => {
      animate(
        element,
        {
          opacity: [0, 1],
          y: [10, 0],
          filter: ['blur(8px)', 'blur(0px)']
        },
        {
          duration: .38,
          easing: [0.22, 1, 0.36, 1]
        }
      );
    });
  }

  function animateVisiblePage() {
    if (!animate) return;

    const page = $$('[id^="pagina-"]').find((el) => !el.classList.contains('hidden'));
    if (!page) return;

    const blocks = [
      ...$$('.kpi-hero, .reports-hero, .assistant-hero, .ia-main-header', page),
      ...$$('.kpi-panel, .kpi-stat-card, .reports-card, .reports-kpi-card, .assistant-card, .assistant-sidecard, .ia-card', page).slice(0, 14)
    ];

    if (!blocks.length) return;

    animate(
      blocks,
      { opacity: [0, 1], y: [12, 0], scale: [0.992, 1] },
      { duration: .34, delay: stagger ? stagger(0.03) : 0, easing: 'ease-out' }
    );
  }

  function patchMostrarPagina() {
    if (typeof window.mostrarPagina !== 'function') return;
    if (window.__pcMostrarPaginaWrapped) return;

    const original = window.mostrarPagina;
    window.mostrarPagina = function (...args) {
      const result = original.apply(this, args);
      requestAnimationFrame(() => {
        markTargets();
        bindInteractiveAnimations();
        enhanceAudioCard();
        animateVisiblePage();
      });
      return result;
    };

    window.__pcMostrarPaginaWrapped = true;
  }

  function patchAlternarTema() {
    if (typeof window.alternarTema !== 'function') return;
    if (window.__pcAlternarTemaWrapped) return;

    const original = window.alternarTema;
    window.alternarTema = function (...args) {
      const result = original.apply(this, args);
      requestAnimationFrame(() => {
        markTargets();
        bindInteractiveAnimations();
        enhanceAudioCard();
      });
      return result;
    };

    window.__pcAlternarTemaWrapped = true;
  }

  function observeDom() {
    const observer = new MutationObserver(() => {
      markTargets();
      bindInteractiveAnimations();
      enhanceAudioCard();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  function initPolish() {
    markTargets();
    bindInteractiveAnimations();
    enhanceAudioCard();
    revealOnView();
    animateVisiblePage();
    patchMostrarPagina();
    patchAlternarTema();
    observeDom();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPolish);
  } else {
    initPolish();
  }
</script>
